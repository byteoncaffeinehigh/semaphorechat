<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Chat bubble -->
  <path
    d="M28 14 L172 14 Q186 14 186 28 L186 138 Q186 152 172 152 L78 152 L48 182 L56 152 L28 152 Q14 152 14 138 L14 28 Q14 14 28 14 Z"
    fill="#070d07"
    stroke="#00ff41"
    stroke-width="6"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Semaphore broadcast signal (pointing up) -->
  <g filter="url(#glow)">
    <!-- Base dot -->
    <circle cx="100" cy="118" r="7" fill="#00ff41"/>

    <!-- Inner arc -->
    <path d="M 80 100 A 22 22 0 0 1 120 100"
          fill="none" stroke="#00ff41" stroke-width="6" stroke-linecap="round"/>

    <!-- Middle arc -->
    <path d="M 60 80 A 45 46 0 0 1 140 80"
          fill="none" stroke="#00ff41" stroke-width="6" stroke-linecap="round"/>

    <!-- Outer arc -->
    <path d="M 40 57 A 70 72 0 0 1 160 57"
          fill="none" stroke="#00ff41" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
